<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ブロック崩し</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Title Screen -->
<div id="titleScreen" class="screen">
  <div class="logo">
    <h1>BLOCK<br>BREAKER</h1>
    <p>ブロック崩し</p>
  </div>
  <button class="btn btn-start" id="startBtn">▶ &nbsp;START</button>
</div>

<!-- Game Screen -->
<div id="gameScreen" class="screen hidden">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- Score Screen -->
<div id="scoreScreen" class="screen hidden">
  <div class="go-title">GAME OVER</div>
  <div class="slabel">SCORE</div>
  <div class="snum" id="scoreVal">0</div>
  <div class="hiscore">BEST &nbsp;<span id="hiVal">0</span></div>
  <button class="btn btn-back" id="backBtn">◀ &nbsp;TITLE</button>
</div>

<script src="js/constants.js"></script>
<script src="js/utils.js"></script>
<script src="js/blocks.js"></script>
<script src="js/renderer.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
