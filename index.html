<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ブロック崩し</title>
<style>
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #040412;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Arial Black', Arial, sans-serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: opacity 0.45s ease;
}
.screen.hidden { opacity: 0; pointer-events: none; }

/* ── Title ── */
#titleScreen {
  background: radial-gradient(ellipse at 50% 35%, #160438 0%, #040412 65%);
}
.logo h1 {
  font-size: clamp(36px, 11vw, 56px);
  font-weight: 900;
  letter-spacing: 8px;
  line-height: 1.1;
  text-align: center;
  background: linear-gradient(135deg, #4D96FF 0%, #C77DFF 50%, #FF6B6B 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 26px rgba(77,150,255,.5));
}
.logo p {
  text-align: center;
  color: rgba(255,255,255,.35);
  font-size: 12px;
  letter-spacing: 10px;
  margin-top: 10px;
}

/* ── Buttons ── */
.btn {
  margin-top: 56px;
  padding: 16px 64px;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: 6px;
  border: none;
  border-radius: 100px;
  cursor: pointer;
  color: #fff;
  transition: transform .15s, box-shadow .15s;
}
.btn-start {
  background: linear-gradient(135deg, #4D96FF, #845EC2);
  box-shadow: 0 0 36px rgba(77,150,255,.45), 0 4px 18px rgba(0,0,0,.5);
}
.btn-start:hover { transform: scale(1.07); box-shadow: 0 0 52px rgba(77,150,255,.7), 0 4px 20px rgba(0,0,0,.6); }
.btn-start:active { transform: scale(.95); }
.btn-back {
  background: linear-gradient(135deg, #6BCB77, #4D96FF);
  box-shadow: 0 0 36px rgba(107,203,119,.4), 0 4px 18px rgba(0,0,0,.5);
  margin-top: 50px;
}
.btn-back:hover { transform: scale(1.07); box-shadow: 0 0 52px rgba(107,203,119,.65), 0 4px 20px rgba(0,0,0,.6); }
.btn-back:active { transform: scale(.95); }

/* ── Game canvas ── */
#gameScreen { background: #000; }
#gameCanvas { display: block; touch-action: none; }

/* ── Score ── */
#scoreScreen {
  background: radial-gradient(ellipse at 50% 40%, #1e0835 0%, #040412 65%);
}
.go-title {
  font-size: clamp(30px, 8vw, 46px);
  font-weight: 900;
  letter-spacing: 7px;
  color: #FF6B6B;
  filter: drop-shadow(0 0 18px rgba(255,107,107,.65));
  margin-bottom: 44px;
}
.slabel {
  font-size: 11px;
  letter-spacing: 7px;
  color: rgba(255,255,255,.38);
  text-align: center;
  margin-bottom: 4px;
}
.snum {
  font-size: clamp(52px, 15vw, 76px);
  font-weight: 900;
  text-align: center;
  line-height: 1;
  background: linear-gradient(135deg, #FFD93D, #FF8C42);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hiscore {
  font-size: 12px;
  letter-spacing: 4px;
  color: rgba(255,255,255,.3);
  text-align: center;
  margin: 10px 0 0;
}
.hiscore span { color: rgba(255,211,61,.65); }
</style>
</head>
<body>

<!-- Title Screen -->
<div id="titleScreen" class="screen">
  <div class="logo">
    <h1>BLOCK<br>BREAKER</h1>
    <p>ブロック崩し</p>
  </div>
  <button class="btn btn-start" id="startBtn">▶ &nbsp;START</button>
</div>

<!-- Game Screen -->
<div id="gameScreen" class="screen hidden">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- Score Screen -->
<div id="scoreScreen" class="screen hidden">
  <div class="go-title">GAME OVER</div>
  <div class="slabel">SCORE</div>
  <div class="snum" id="scoreVal">0</div>
  <div class="hiscore">BEST &nbsp;<span id="hiVal">0</span></div>
  <button class="btn btn-back" id="backBtn">◀ &nbsp;TITLE</button>
</div>

<script>
'use strict';

// ─── Constants ─────────────────────────────────────────────────
const CW = 400, CH = 640;
const COLS  = 8;
const BW    = CW / COLS;   // 50 px per column
const BH    = 18;
const BGAP  = 3;
const BTOP  = 8;

const PW = 90, PH = 13;
const PADDLE_Y = CH - 56;  // paddle top  (= 584)

const BALL_R = 7;
const SPEED  = 6.0;

const ROW_MS   = 7000;     // new row every 7 s
const DANGER_Y = 498;      // block bottom >= this → game over

const COLORS = ['#FF6B6B','#FF8C42','#FFD93D','#6BCB77','#4D96FF','#C77DFF'];

// ─── State ─────────────────────────────────────────────────────
let canvas, ctx;
let blocks = [];
let ball   = {};
let paddleX = CW / 2;
let score = 0, hiScore = 0;
let gameRunning = false;
let animId = null;
let elapsed = 0, nextRowAt = 0, prevTs = null;

// ─── Helpers ───────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function rr(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

// ─── Init ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  canvas = document.getElementById('gameCanvas');
  ctx    = canvas.getContext('2d');
  canvas.width  = CW;
  canvas.height = CH;

  function resize() {
    const s = Math.min(window.innerWidth / CW, window.innerHeight / CH);
    canvas.style.width  = CW * s + 'px';
    canvas.style.height = CH * s + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  function trackPointer(clientX) {
    const r = canvas.getBoundingClientRect();
    paddleX = clamp((clientX - r.left) * (CW / r.width), PW / 2, CW - PW / 2);
  }

  canvas.addEventListener('mousemove',  e => trackPointer(e.clientX));
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); trackPointer(e.touches[0].clientX); }, { passive: false });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); trackPointer(e.touches[0].clientX); }, { passive: false });

  document.getElementById('startBtn').addEventListener('click', () => {
    showScreen('game');
    startGame();
  });
  document.getElementById('backBtn').addEventListener('click', () => {
    showScreen('title');
  });
});

// ─── Screens ───────────────────────────────────────────────────
function showScreen(name) {
  ['title','game','score'].forEach(n => {
    document.getElementById(n + 'Screen').classList.toggle('hidden', n !== name);
  });
}

// ─── Blocks ────────────────────────────────────────────────────
function blockTopY(row) { return BTOP + row * (BH + BGAP); }

function addRow() {
  blocks.forEach(b => b.row++);
  for (let c = 0; c < COLS; c++) {
    if (Math.random() < 0.78) {
      blocks.push({
        col: c,
        row: 0,
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
      });
    }
  }
}

function dangerReached() {
  return blocks.some(b => blockTopY(b.row) + BH >= DANGER_Y);
}

// ─── Game start ────────────────────────────────────────────────
function startGame() {
  blocks = [];
  score  = 0;
  paddleX = CW / 2;
  elapsed = 0;
  nextRowAt = ROW_MS;
  prevTs = null;
  gameRunning = true;

  // Three initial rows
  for (let i = 0; i < 3; i++) addRow();

  // Ball launches upward with slight random angle
  const ang = (Math.random() - 0.5) * 0.85;
  ball = {
    x:  CW / 2,
    y:  PADDLE_Y - 28,
    vx: SPEED * Math.sin(ang),
    vy: -SPEED * Math.cos(ang)
  };

  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

// ─── Game loop ─────────────────────────────────────────────────
function loop(ts) {
  if (!prevTs) prevTs = ts;
  const dt = Math.min(ts - prevTs, 50);
  prevTs = ts;
  elapsed += dt;

  // Periodic new row
  if (elapsed >= nextRowAt) {
    addRow();
    nextRowAt += ROW_MS;
    if (dangerReached()) { endGame(); return; }
  }

  // ── Ball movement ──
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounces
  if (ball.x - BALL_R < 0)  { ball.x = BALL_R;      ball.vx =  Math.abs(ball.vx); }
  if (ball.x + BALL_R > CW) { ball.x = CW - BALL_R; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - BALL_R < 0)  { ball.y = BALL_R;       ball.vy =  Math.abs(ball.vy); }

  // Ball fell below canvas
  if (ball.y - BALL_R > CH) { endGame(); return; }

  // ── Paddle collision ──
  const px = paddleX - PW / 2;
  const closestPX = clamp(ball.x, px, px + PW);
  const closestPY = clamp(ball.y, PADDLE_Y, PADDLE_Y + PH);
  const pdx = ball.x - closestPX, pdy = ball.y - closestPY;
  if (ball.vy > 0 && pdx * pdx + pdy * pdy < BALL_R * BALL_R) {
    const hit = clamp((ball.x - paddleX) / (PW / 2), -0.9, 0.9);
    ball.vx = SPEED * hit;
    ball.vy = -Math.sqrt(SPEED * SPEED - ball.vx * ball.vx);
    ball.y  = PADDLE_Y - BALL_R;
  }

  // ── Block collisions ──
  hitBlocks();

  // ── Draw ──
  draw();

  if (gameRunning) animId = requestAnimationFrame(loop);
}

function hitBlocks() {
  let reflX = false, reflY = false;
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b  = blocks[i];
    const bx = b.col * BW + BGAP / 2;
    const by = blockTopY(b.row);
    const bw = BW - BGAP;

    const cx = clamp(ball.x, bx, bx + bw);
    const cy = clamp(ball.y, by, by + BH);
    const dx = ball.x - cx, dy = ball.y - cy;

    if (dx * dx + dy * dy < BALL_R * BALL_R) {
      blocks.splice(i, 1);
      score += 10;
      if (Math.abs(dx) >= Math.abs(dy)) {
        if (!reflX) { ball.vx *= -1; reflX = true; }
      } else {
        if (!reflY) { ball.vy *= -1; reflY = true; }
      }
    }
  }
}

// ─── End game ──────────────────────────────────────────────────
function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  if (score > hiScore) hiScore = score;
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('hiVal').textContent    = hiScore;

  // Brief delay so player can register what happened
  setTimeout(() => showScreen('score'), 350);
}

// ─── Draw ──────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#060618';
  ctx.fillRect(0, 0, CW, CH);

  // Subtle column grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x = BW; x < CW; x += BW) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke();
  }

  // Danger zone glow
  const dg = ctx.createLinearGradient(0, DANGER_Y - 32, 0, DANGER_Y + 8);
  dg.addColorStop(0, 'rgba(255,50,50,0)');
  dg.addColorStop(1, 'rgba(255,50,50,0.09)');
  ctx.fillStyle = dg;
  ctx.fillRect(0, DANGER_Y - 32, CW, 40);

  // Danger line
  ctx.strokeStyle = 'rgba(255,80,80,0.55)';
  ctx.setLineDash([10, 7]);
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, DANGER_Y); ctx.lineTo(CW, DANGER_Y); ctx.stroke();
  ctx.setLineDash([]);

  // Danger label
  ctx.fillStyle = 'rgba(255,100,100,0.45)';
  ctx.font = '10px Arial';
  ctx.fillText('DANGER', CW - 54, DANGER_Y - 4);

  // ── Blocks ──
  blocks.forEach(b => {
    const x = b.col * BW + BGAP / 2;
    const y = blockTopY(b.row);
    const w = BW - BGAP;

    ctx.shadowColor = b.color;
    ctx.shadowBlur  = 7;
    ctx.fillStyle   = b.color;
    rr(x, y, w, BH, 3);
    ctx.fill();

    // Shine strip
    ctx.shadowBlur  = 0;
    ctx.fillStyle   = 'rgba(255,255,255,0.22)';
    rr(x + 2, y + 2, w - 4, 5, 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // ── Paddle ──
  const px = paddleX - PW / 2;
  ctx.shadowColor = '#4D96FF';
  ctx.shadowBlur  = 24;
  const pg = ctx.createLinearGradient(px, 0, px + PW, 0);
  pg.addColorStop(0, '#4D96FF');
  pg.addColorStop(1, '#845EC2');
  ctx.fillStyle = pg;
  rr(px, PADDLE_Y, PW, PH, 7);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Paddle shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  rr(px + 4, PADDLE_Y + 2, PW - 8, 4, 3);
  ctx.fill();

  // ── Ball ──
  ctx.shadowColor = '#FFD93D';
  ctx.shadowBlur  = 24;
  const bg = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, BALL_R);
  bg.addColorStop(0,    '#FFF');
  bg.addColorStop(0.35, '#FFD93D');
  bg.addColorStop(1,    '#FF8C42');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // ── HUD ──
  // Score (bottom-left, above progress bar)
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = 'bold 13px Arial';
  ctx.fillText('SCORE  ' + score, 12, CH - 12);

  // Next-row progress bar (very bottom)
  const pct = clamp(1 - (nextRowAt - elapsed) / ROW_MS, 0, 1);
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(0, CH - 5, CW, 5);
  const bGrad = ctx.createLinearGradient(0, 0, CW * pct, 0);
  bGrad.addColorStop(0, 'rgba(77,150,255,0.7)');
  bGrad.addColorStop(1, 'rgba(199,125,255,0.9)');
  ctx.fillStyle = bGrad;
  ctx.fillRect(0, CH - 5, CW * pct, 5);

  // Progress label
  ctx.fillStyle = 'rgba(200,180,255,0.45)';
  ctx.font = '10px Arial';
  ctx.fillText('NEXT ROW', CW - 66, CH - 9);
}
</script>
</body>
</html>
